<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido/a - Casita Azul</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #f4f6f5; font-family: sans-serif; }
        .container { position: relative; width: 100%; max-width: 450px; line-height: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 15px; overflow: hidden; }
        .main-image { width: 100%; height: auto; display: block; }
        .btn-overlay { position: absolute; left: 10%; width: 80%; height: 10%; cursor: pointer; text-decoration: none; border-radius: 50px; }
        .btn-wifi { top: 43.5%; }
        .btn-whatsapp { top: 63%; }
        #wifi-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 50px rgba(0,0,0,0.4); z-index: 100; text-align: center; width: 85%; max-width: 320px; line-height: 1.6; }
        .wifi-title { margin-top: 0; color: #2d5a27; }
        .wifi-data { background: #f9f9f9; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px dashed #ccc; }
        .close-btn { width: 100%; padding: 12px; background: #2d5a27; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
        #overlay-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; }
    </style>
</head>
<body>
<div id="overlay-bg" onclick="closeWifi()"></div>
<div class="container">
    <<img src="https://i.postimg.cc/RVZjysP6/Gemini-Generated-Image-kazo2ckazo2ckazo.png" alt="Bienvenido a Casita Azul" class="main-image">
    <div class="btn-overlay btn-wifi" onclick="showWifi()"></div>
    <a href="https://wa.me/573216970398" class="btn-overlay btn-whatsapp" target="_blank"></a>
</div>
<div id="wifi-modal">
    <h3 class="wifi-title">Conexión Wi-Fi 📶</h3>
    <div class="wifi-data">
        <p><b>Red:</b>CASITA-AZUL</p>
        <p><b>Clave:</b>Salento999</p>
    </div>
    <button class="close-btn" onclick="closeWifi()">ENTENDIDO</button>
</div>
<script>
    function showWifi() { document.getElementById('wifi-modal').style.display = 'block'; document.getElementById('overlay-bg').style.display = 'block'; }
    function closeWifi() { document.getElementById('wifi-modal').style.display = 'none'; document.getElementById('overlay-bg').style.display = 'none'; }
</script>
</body>
</html>
